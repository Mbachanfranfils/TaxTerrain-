server {
    listen 80;
    server_name _;

    # Root directory where the SPA is served from
    root /usr/share/nginx/html;
    index _shell.html;

    # Serve static assets (JS, CSS, images etc.) directly
    location /assets/ {
        try_files $uri $uri/ =404;
        # Cache static assets aggressively since they are content-hashed
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # For all other routes, fall back to _shell.html so TanStack Router
    # can handle client-side navigation (SPA fallback)
    location / {
        try_files $uri $uri/ /_shell.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
